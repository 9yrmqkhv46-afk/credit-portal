# ===========================================================================
# Render Blueprint for the TransformBiz Credit Lenders Portal
# ---------------------------------------------------------------------------
# One-click deploy: push this repo to GitHub, then on https://render.com choose
# "New +" -> "Blueprint", connect this repository, and Render reads this file
# to provision everything below automatically:
#
#   1. A managed PostgreSQL database  (transformbiz-db)
#   2. The backend Express API        (transformbiz-backend)
#   3. The Next.js frontend           (transformbiz-frontend)
#
# Cross-service URLs below assume Render's default <service-name>.onrender.com
# domains. If Render assigns a different name (e.g. on a collision), update the
# two URL values marked  # >>> EDIT IF RENAMED  to match your actual URLs.
# ===========================================================================

databases:
  - name: transformbiz-db
    databaseName: transformbiz
    user: transformbiz
    plan: free

services:
  # ---------------------------------------------------------------------
  # Backend - Express + Prisma API
  # ---------------------------------------------------------------------
  - type: web
    name: transformbiz-backend
    runtime: node
    plan: free
    rootDir: backend
    # Install deps, generate the Prisma client against the PostgreSQL schema,
    # then compile TypeScript to dist/.
    # --include=dev is required because NODE_ENV=production would otherwise make
    # npm skip devDependencies (typescript, prisma) that the build needs.
    buildCommand: npm install --include=dev && npm run build:prod
    # Sync the database schema to PostgreSQL (prisma db push) then start the
    # compiled server.
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Connection string is injected from the managed PostgreSQL database.
      - key: DATABASE_URL
        fromDatabase:
          name: transformbiz-db
          property: connectionString
      # Strong JWT secret auto-generated by Render (never shown in the repo).
      - key: JWT_SECRET
        generateValue: true
      # Used by the backend CORS allow-list. Must match the frontend origin.
      - key: FRONTEND_URL
        value: https://transformbiz-frontend.onrender.com   # >>> EDIT IF RENAMED

  # ---------------------------------------------------------------------
  # Frontend - Next.js app
  # ---------------------------------------------------------------------
  - type: web
    name: transformbiz-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      # NEXT_PUBLIC_ vars are inlined at build time, so this points the browser
      # at the backend API. Must include the /api suffix.
      - key: NEXT_PUBLIC_API_URL
        value: https://transformbiz-backend.onrender.com/api   # >>> EDIT IF RENAMED
